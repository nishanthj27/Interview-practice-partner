<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Interview Practice Partner</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="dashboard-body">
    <div class="page-toolbar">
        <div class="toolbar-left">
            <a class="toolbar-link" href="/index.html">Interview Home</a>
        </div>
        <div class="toolbar-right">
            <span class="toolbar-email" data-auth-email></span>
            <button class="toolbar-button" data-auth-signout>Sign Out</button>
        </div>
    </div>

    <main class="dashboard-shell">
        <header class="dashboard-header">
            <h1>Your Interview Analytics</h1>
            <p>Track saved sessions, scores, and improvement over time.</p>
            <p class="dashboard-error" id="dashboardError"></p>
        </header>

        <section class="dashboard-grid metrics-grid">
            <div class="metric-card">
                <span class="metric-label">Total Interviews</span>
                <strong id="totalInterviews">-</strong>
            </div>
            <div class="metric-card">
                <span class="metric-label">Completed</span>
                <strong id="completedInterviews">-</strong>
            </div>
            <div class="metric-card">
                <span class="metric-label">Practice Minutes</span>
                <strong id="practiceMinutes">-</strong>
            </div>
            <div class="metric-card">
                <span class="metric-label">Average Score</span>
                <strong id="averageScore">-</strong>
            </div>
        </section>

        <section class="dashboard-grid">
            <div class="dashboard-panel">
                <h2>14-Day Activity</h2>
                <div id="timelineRows"></div>
            </div>
            <div class="dashboard-panel">
                <h2>Role Breakdown</h2>
                <div id="jobRows"></div>
            </div>
        </section>

        <section class="dashboard-panel">
            <h2>Recent Sessions</h2>
            <div id="recentSessions"></div>
        </section>
    </main>

    <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
