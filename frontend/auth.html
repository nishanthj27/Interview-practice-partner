<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Interview Practice Partner</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-body">
    <div class="auth-shell">
        <div class="auth-card" id="authCard" data-mode="signin">
            <div class="auth-brand">
                <h1>Interview Practice Partner</h1>
                <p id="authHelperText">Sign in to continue your interview practice.</p>
            </div>

            <div class="auth-toggle">
                <button id="showSignIn" class="active" type="button">Sign In</button>
                <button id="showSignUp" type="button">Create Account</button>
            </div>

            <form id="authForm" class="auth-form">
                <div class="form-group" id="nameGroup" hidden>
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter a strong password" required minlength="6">
                </div>

                <button type="submit" class="btn-primary auth-submit" id="authSubmit">Sign In</button>
                <p class="auth-status" id="authStatus"></p>
            </form>
        </div>
    </div>

    <script type="module" src="/js/auth-page.js"></script>
</body>
</html>
