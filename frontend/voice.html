<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Interview - Interview Practice Partner</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="interview-body voice-body">
    <div class="interview-container">
        <header class="interview-header">
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">← Back</button>
                <div class="job-info">
                    <h2 id="jobTitle">Loading...</h2>
                    <span class="mode-badge voice-badge">Voice Mode</span>
                </div>
            </div>
            <div class="header-right">
                <div class="timer" id="timer">10:00</div>
                <button class="end-btn" onclick="endInterview()">End Interview</button>
            </div>
        </header>

        <div class="voice-interview-layout">
            <!-- Left Side: Conversation Display -->
            <div class="conversation-display">
                <div class="conversation-messages" id="conversationMessages">
                    <div class="welcome-message-voice">
                        <div class="welcome-icon">👋</div>
                        <h3>Welcome to Your AI Interview</h3>
                        <p>Click "Start Interview" to begin your voice interview session</p>
                    </div>
                </div>
            </div>

            <!-- Right Side: Camera and Avatar -->
            <div class="media-panel">
                <!-- Camera Preview -->
                <div class="camera-section">
                    <div class="camera-container" id="cameraContainer">
                        <video id="cameraPreview" autoplay playsinline muted></video>
                        <div class="camera-overlay" id="cameraOverlay">
                            <div class="camera-icon">📷</div>
                            <p>Camera Preview</p>
                            <button class="enable-camera-btn" onclick="enableCamera()">Enable Camera</button>
                        </div>
                        <button class="toggle-camera-btn" id="toggleCameraBtn" onclick="toggleCamera()" style="display: none;">
                            <span id="cameraToggleIcon">📷</span>
                        </button>
                    </div>
                </div>

                <!-- Avatar Section -->
                <div class="avatar-section-compact">
                    <div class="avatar-wrapper" id="avatarWrapper">
                        <div class="avatar" id="avatar">
                            <div class="avatar-face">🎙️</div>
                            <div class="pulse-ring"></div>
                            <div class="pulse-ring delayed"></div>
                        </div>
                        <div class="avatar-status" id="avatarStatus">Ready</div>
                    </div>

                    <div class="start-button-wrapper" id="startWrapper">
                        <button class="start-interview-btn" id="startBtn" onclick="startInterview()">
                            <span class="btn-icon">🎤</span>
                            Start Interview
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div class="modal feedback-modal" id="feedbackModal">
        <div class="modal-content feedback-content">
            <div class="feedback-header">
                <h2>📊 Interview Feedback</h2>
            </div>
            <div class="feedback-body" id="feedbackBody">
                <div class="loading-feedback">
                    <div class="spinner"></div>
                    <p>Analyzing your interview performance...</p>
                </div>
            </div>
            <div class="feedback-actions">
                <button class="btn-secondary" onclick="goHome()">Back to Home</button>
                <button class="btn-primary" onclick="retakeInterview()">Retake Interview</button>
            </div>
        </div>
    </div>

    <style>
        /* Voice Interview Layout */
        .voice-interview-layout {
            display: flex;
            height: calc(100vh - 80px);
            gap: 1.5rem;
            padding: 1.5rem;
        }

        /* Left Side: Conversation Display */
        .conversation-display {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .conversation-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .welcome-message-voice {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--bg-tertiary);
            border-radius: 12px;
            margin: auto;
        }

        .welcome-message-voice .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .welcome-message-voice h3 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .welcome-message-voice p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Chat Message Styles */
        .chat-message {
            display: flex;
            gap: 1rem;
            max-width: 85%;
            animation: messageSlideIn 0.3s ease;
        }

        .chat-message.bot-message {
            align-self: flex-start;
        }

        .chat-message.user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .chat-message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .chat-message.user-message .chat-message-avatar {
            background: var(--success-color);
        }

        .chat-message-content {
            background: var(--bg-tertiary);
            padding: 1rem 1.25rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            line-height: 1.6;
        }

        .chat-message.user-message .chat-message-content {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .chat-message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* Right Side: Media Panel */
        .media-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex-shrink: 0;
        }

        /* Camera Section */
        .camera-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 2px solid var(--border-color);
            overflow: hidden;
            position: relative;
        }

        .camera-container {
            position: relative;
            width: 100%;
            height: 280px;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
        }

        #cameraPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            transform: scaleX(-1);
        }

        #cameraPreview.active {
            display: block;
        }

        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .camera-overlay.hidden {
            display: none;
        }

        .camera-icon {
            font-size: 3rem;
            opacity: 0.5;
        }

        .camera-overlay p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .enable-camera-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .enable-camera-btn:hover {
            background: var(--primary-dark);
        }

        .toggle-camera-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            z-index: 10;
        }

        .toggle-camera-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.1);
        }

        #cameraToggleIcon {
            font-size: 1.2rem;
        }

        /* Avatar Section - Compact */
        .avatar-section-compact {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 2px solid var(--border-color);
            padding: 1.5rem;
            text-align: center;
        }

        .avatar-section-compact .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 12px;
            margin-bottom: 1rem;
        }

        .avatar-section-compact .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.3);
        }

        .avatar-section-compact .avatar-face {
            font-size: 3.5rem;
        }

        .avatar-section-compact .avatar-status {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-top: 0.8rem;
        }

        .avatar-section-compact .start-button-wrapper {
            margin-top: 1rem;
        }

        .avatar-section-compact .start-interview-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .avatar-section-compact .start-interview-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.4);
        }

        .avatar-section-compact .btn-icon {
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .voice-interview-layout {
                flex-direction: column;
            }

            .media-panel {
                width: 100%;
                flex-direction: row;
            }

            .camera-section,
            .avatar-section-compact {
                flex: 1;
            }
        }

        @media (max-width: 768px) {
            .media-panel {
                flex-direction: column;
            }

            .camera-container {
                height: 220px;
            }

            .avatar-section-compact .avatar {
                width: 120px;
                height: 120px;
            }

            .avatar-section-compact .avatar-face {
                font-size: 3rem;
            }
        }
    </style>

    <script type="module" src="/js/voice-mode.js"></script>
</body>
</html>
